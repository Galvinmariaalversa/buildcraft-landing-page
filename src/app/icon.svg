<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Premium Metallic Champagne Gold Gradient -->
    <linearGradient id="goldGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A7B4C" />
      <stop offset="30%" stop-color="#C9A66B" />
      <stop offset="70%" stop-color="#E6C594" />
      <stop offset="100%" stop-color="#C9A66B" />
    </linearGradient>
  </defs>

  <g id="skyscraper-monogram">
    <!-- Center Tower Spire -->
    <rect x="44" y="14" width="12" height="66" rx="1" fill="url(#goldGradient)" />
    
    <!-- Left Inner Tower (Part of C) -->
    <rect x="28" y="26" width="12" height="54" rx="1" fill="url(#goldGradient)" />
    
    <!-- Left Outer Tower (Part of C) -->
    <rect x="12" y="38" width="12" height="42" rx="1" fill="url(#goldGradient)" />
    
    <!-- Left Structural Connectors (C loops) -->
    <rect x="24" y="38" width="4" height="6" fill="url(#goldGradient)" />
    <rect x="24" y="74" width="4" height="6" fill="url(#goldGradient)" />
    
    <!-- Right Inner Tower (Part of B) -->
    <rect x="60" y="26" width="12" height="54" rx="1" fill="url(#goldGradient)" />
    
    <!-- Right Outer Tower (Part of B) -->
    <rect x="76" y="38" width="12" height="42" rx="1" fill="url(#goldGradient)" />
    
    <!-- Right Structural Connectors (B loops) -->
    <rect x="72" y="38" width="4" height="6" fill="url(#goldGradient)" />
    <rect x="72" y="56" width="4" height="6" fill="url(#goldGradient)" />
    <rect x="72" y="74" width="4" height="6" fill="url(#goldGradient)" />
  </g>
</svg>
